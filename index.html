<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원종제일교회 찬양 아카이브</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #F5F7FA;
            --card-bg: #FFFFFF;
            --text-main: #2C3E50;
            --text-muted: #7F8C8D;
            --border-color: #E2E8F0;
            --notice-bg: #FFF3CD;
            --notice-text: #856404;
            --comment-bg: #EBF4FF;
            --comment-text: #2B6CB0;
        }

        body.dark-theme {
            --primary-color: #5D9CEC;
            --bg-color: #1E1E1E;
            --card-bg: #2D2D2D;
            --text-main: #D4D4D4;
            --text-muted: #9E9E9E;
            --border-color: #404040;
            --notice-bg: #4D3800;
            --notice-text: #FFD966;
            --comment-bg: #1A365D;
            --comment-text: #90CDF4;
        }

        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; margin: 0; padding: 0; transition: background-color 0.3s; }
        header { background-color: var(--card-bg); padding: 1.5rem 1rem; text-align: center; border-bottom: 1px solid var(--border-color); }
        header h1 { margin: 0; font-size: 1.5rem; font-weight: 700; }
        .container { max-width: 800px; margin: 1.5rem auto; padding: 0 1rem; }
        .announcement { background-color: var(--notice-bg); color: var(--notice-text); padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-weight: 600; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(0,0,0,0.05); }
        
        .controls { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; gap: 10px; }
        .search-box { flex: 1; min-width: 200px; padding: 0.7rem; border: 1px solid var(--border-color); border-radius: 8px; background: var(--card-bg); color: var(--text-main); font-family: inherit; }
        .btn-group { display: flex; gap: 8px; }
        .btn { padding: 0.6rem 1rem; border: 1px solid var(--primary-color); border-radius: 8px; background: transparent; color: var(--primary-color); font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .btn:hover { background: var(--primary-color); color: white; }

        .card { background-color: var(--card-bg); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid var(--border-color); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .date-badge { display: inline-block; background-color: var(--primary-color); color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-bottom: 1rem; }
        
        .song-list { list-style: none; padding: 0; margin: 0; }
        .song-list li { padding: 1rem 0; border-bottom: 1px solid var(--border-color); }
        .song-list li:last-child { border-bottom: none; }
        .song-header { display: flex; justify-content: space-between; align-items: center; }
        .song-title { font-weight: 600; font-size: 1.05rem; }
        .song-key { background-color: var(--border-color); padding: 0.2rem 0.5rem; border-radius: 6px; font-size: 0.8rem; font-weight: 800; margin-left: 5px; }
        .song-comment { margin-top: 0.5rem; background-color: var(--comment-bg); color: var(--comment-text); padding: 0.4rem 0.8rem; border-radius: 8px; font-size: 0.85rem; font-weight: 500; display: inline-block; }
        
        .links { display: flex; gap: 12px; }
        .yt-link, .sheet-link { text-decoration: none; font-size: 1.2rem; filter: grayscale(100%); transition: 0.2s; cursor: pointer; }
        .yt-link:hover, .sheet-link:hover { filter: grayscale(0%); transform: scale(1.1); }

        /* 악보 전용 라이트박스(모달) */
        #sheetModal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.9); 
            z-index: 2000; 
            overflow: hidden;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #modalImg { max-width: 95%; max-height: 85%; object-fit: contain; border-radius: 4px; }
        .modal-close-btn { 
            position: absolute; top: 20px; right: 20px; 
            background: white; color: black; border: none; 
            padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer;
        }
        #modalCaption { color: white; margin-top: 15px; font-size: 1.2rem; font-weight: bold; }

        /* 기존의 보관함 모달 */
        #libraryModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-color); z-index: 1000; overflow-y: auto; padding: 2rem 1rem; }
        .modal-content { max-width: 700px; margin: 0 auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 2px solid var(--primary-color); padding-bottom: 1rem; }
        .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .library-item { background: var(--card-bg); padding: 1rem; border-radius: 12px; border: 1px solid var(--border-color); text-align: center; cursor: pointer; transition: 0.2s; }
        .library-item:hover { transform: translateY(-3px); border-color: var(--primary-color); }

        .all-sheets-area { margin-top: 1.5rem; border-top: 2px solid var(--border-color); padding-top: 1.5rem; display: none; }
        .sheet-item { margin-bottom: 2rem; text-align: center; }
        .full-sheet-img { width: 100%; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>원종제일교회 찬양 아카이브</h1></header>
    <div class="container">
        <div class="announcement">📢 보면대를 꼭 정리해주시기바랍니다.</div>
        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="곡명 또는 날짜 검색..." onkeyup="filterSetlists()">
            <div class="btn-group">
                <button class="btn" onclick="openLibrary()">📚 악보 보관함</button>
                <button class="btn" onclick="document.body.classList.toggle('dark-theme')">🌙 테마</button>
            </div>
        </div>
        <div id="setlist-container"></div>
    </div>

    <div id="sheetModal" onclick="closeSheet()">
        <button class="modal-close-btn">닫기 (돌아가기)</button>
        <img id="modalImg" src="" alt="악보 확대">
        <div id="modalCaption"></div>
    </div>

    <div id="libraryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 style="margin:0;">📚 악보 보관함</h2>
                <button class="btn" onclick="closeLibrary()">❌ 닫기</button>
            </div>
            <div id="libraryGrid" class="library-grid"></div>
        </div>
    </div>

    <script>
        const setlists = [
            {
                date: "2026-03-29",
                songs: [
                    { title: "축복송", key: "G", sheet: "scores/축복송.jpg" },
                    { title: "나의 가장 낮은 마음", key: "A", sheet: "scores/나의가장낮은마음.jpg" },
                    { title: "난 예수가 좋다오", key: "A", comment: "📢 후렴으로 시작합니다.", sheet: "scores/난예수가좋다오.jpg" },
                    { title: "내 안에 부어주소서", key: "A", comment: "🕺 주일학교 율동과 함께", sheet: "scores/내안에부어주소서.jpg" },
                    { title: "천국은 마치", key: "A", comment: "🕺 주일학교 율동과 함께", sheet: "scores/천국은마치.jpg" },
                    { title: "주만 바라볼찌라", key: "A", sheet: "scores/주만바라볼찌라.jpg" },
                    { title: "이 땅의 황무함을 보소서", key: "A", comment: "📢 후렴으로 시작합니다.", sheet: "scores/이땅의황무함을보소서.jpg" },
                    { title: "그 사랑 (기도회 찬양)", key: "G", sheet: "scores/그사랑.jpg" }
                ]
            },
            { date: "2026-03-22", songs: [{ title: "내가 매일 기쁘게", key: "G" }, { title: "내 영혼에 햇빛 비치니", key: "G" }, { title: "주만 바라볼찌라", key: "A" }] },
            { date: "2026-03-15", songs: [{ title: "내가 매일 기쁘게", key: "G" }, { title: "내 영혼에 햇빛 비치니", key: "G" }, { title: "주만 바라볼찌라", key: "A" }] },
            { date: "2026-03-08", songs: [{ title: "슬픈마음 있는 사람", key: "G" }, { title: "살아계신 주 (후렴)", key: "G" }, { title: "깊어진 삶을 주께", key: "F" }] },
            { date: "2026-01-25", songs: [{ title: "보혈을 지나", key: "G" }, { title: "당신은 영광의 왕", key: "G" }] },
            { date: "2025-10-26", songs: [{ title: "실로암", key: "C" }, { title: "난 예수가 좋다오", key: "A" }, { title: "나의 가장 낮은 마음", key: "A" }, { title: "하늘소망", key: "A" }] },
            { date: "2023-12-08", songs: [{ title: "축복송 (때로는 너의 앞에)", key: "D" }, { title: "주 예수 내 맘에", key: "Ab" }, { title: "부르신 곳에서", key: "E" }] }
        ];

        const globalSheetMap = {};
        setlists.forEach(set => set.songs.forEach(s => { if (s.sheet && !globalSheetMap[s.title]) globalSheetMap[s.title] = s.sheet; }));

        function renderSetlists(data) {
            const container = document.getElementById('setlist-container');
            container.innerHTML = data.map((set, idx) => {
                const hasAnySheet = set.songs.some(s => s.sheet || globalSheetMap[s.title]);
                const songsHtml = set.songs.map((s, i) => {
                    const sheetPath = s.sheet || globalSheetMap[s.title];
                    return `<li><div class="song-header"><div><span class="song-title">${i+1}. ${s.title}</span><span class="song-key">${s.key}</span></div><div class="links"><a href="https://www.youtube.com/results?search_query=${s.title} 찬양" target="_blank" class="yt-link">▶️</a>${sheetPath ? `<a onclick="openSheet('${sheetPath}', '${s.title}')" class="sheet-link">🎼</a>` : ''}</div></div>${s.comment ? `<div class="song-comment">${s.comment}</div>` : ''}</li>`;
                }).join('');
                return `<div class="card"><div class="date-badge">${set.date}</div><ul class="song-list">${songsHtml}</ul>${hasAnySheet ? `<button class="btn" style="width:100%; margin-top:1.2rem; border-color:var(--border-color); color:var(--text-muted);" onclick="toggleSheets(${idx})">🖼️ 전체 악보 펼쳐보기</button>` : ''}<div id="sheet-area-${idx}" class="all-sheets-area">${set.songs.map(s => { const path = s.sheet || globalSheetMap[s.title]; return path ? `<div class="sheet-item"><p style="font-weight:700; color:var(--primary-color);">${s.title}</p>${s.comment ? `<div class="song-comment" style="margin-bottom:10px;">${s.comment}</div>` : ''}<img src="${path}" class="full-sheet-img" onclick="openSheet('${path}', '${s.title}')"></div>` : ''; }).join('')}</div></div>`;
            }).join('');
        }

        // 악보 크게 보기 (라이트박스 열기)
        function openSheet(path, title) {
            document.getElementById('modalImg').src = path;
            document.getElementById('modalCaption').innerText = title;
            document.getElementById('sheetModal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // 스크롤 방지
        }

        // 악보 닫기 (돌아가기)
        function closeSheet() {
            document.getElementById('sheetModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function toggleSheets(idx) { 
            const el = document.getElementById(`sheet-area-${idx}`); 
            el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'block' : 'none'; 
            event.target.innerText = (el.style.display === 'block') ? '❌ 악보 접기' : '🖼️ 전체 악보 펼쳐보기'; 
        }
        
        function openLibrary() {
            const grid = document.getElementById('libraryGrid');
            grid.innerHTML = Object.keys(globalSheetMap).sort().map(title => `
                <div class="library-item" onclick="openSheet('${globalSheetMap[title]}', '${title}')">
                    <div style="font-size: 1.5rem;">🎼</div>
                    <p>${title}</p>
                </div>
            `).join('');
            document.getElementById('libraryModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeLibrary() { document.getElementById('libraryModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function filterSetlists() { const q = document.getElementById('searchInput').value.toLowerCase(); renderSetlists(setlists.filter(s => s.date.includes(q) || s.songs.some(song => song.title.toLowerCase().includes(q)))); }
        renderSetlists(setlists);
    </script>
</body>
</html>
