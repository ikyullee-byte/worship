<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원종제일교회 찬양 아카이브</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --main-bg: #f8fafc;
            --main-accent: #3b82f6;
            --main-accent-soft: #eff6ff;
            --main-card: #ffffff;
            --main-text: #1e293b;
            --main-muted: #64748b;
            --main-border: #e2e8f0;
            --gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        body {
            background-color: var(--main-bg);
            color: var(--main-text);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 5rem 2rem 3rem;
            text-align: center;
            background: radial-gradient(circle at top, #dbeafe 0%, transparent 70%);
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin: 0;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--main-muted);
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            margin-top: 12px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            padding: 0 1.5rem 5rem;
        }

        .announcement {
            background: #ffffff;
            border-left: 5px solid var(--main-accent);
            padding: 1.2rem;
            border-radius: 12px;
            margin-bottom: 3rem;
            font-size: 1rem;
            font-weight: 700;
            color: var(--main-text);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 3rem;
        }

        .search-box {
            flex: 1;
            background: var(--main-card);
            border: 2px solid var(--main-border);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            color: var(--main-text);
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-box:focus {
            border-color: var(--main-accent);
            box-shadow: 0 0 0 4px var(--main-accent-soft);
        }

        .btn {
            background: var(--main-text);
            color: white;
            padding: 0 1.8rem;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--main-accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }

        .setlist-item {
            background: var(--main-card);
            border-radius: 28px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            border: 1px solid var(--main-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            transition: transform 0.3s ease;
        }

        .date-label {
            font-size: 0.9rem;
            color: var(--main-accent);
            font-weight: 800;
            margin-bottom: 1.5rem;
            display: block;
        }

        .song-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 0;
            border-bottom: 1px solid var(--main-border);
        }

        .song-row:last-child { border-bottom: none; }

        .song-main { display: flex; align-items: center; gap: 12px; }

        .song-title { font-size: 1.25rem; font-weight: 800; color: var(--main-text); }

        .song-key {
            background: var(--main-accent-soft);
            color: var(--main-accent);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 800;
        }

        .song-comment {
            font-size: 0.9rem;
            color: var(--main-muted);
            margin-top: 6px;
            font-weight: 500;
        }

        .action-btns { display: flex; gap: 10px; }

        .icon-btn {
            background: #f1f5f9;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            color: var(--main-text);
            font-weight: 700;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .icon-btn:hover {
            background: var(--main-accent);
            color: white;
        }

        .expand-area {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 2px dashed var(--main-border);
            display: none;
        }

        .sheet-thumb {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 2rem;
            cursor: pointer;
            border: 1px solid var(--main-border);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* Modal */
        #sheetModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #modalImg { max-width: 92%; max-height: 82vh; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }

        .close-overlay {
            position: absolute; top: 30px; right: 30px;
            background: var(--main-text); color: white;
            padding: 12px 24px; border-radius: 100px; cursor: pointer;
            font-weight: 700;
        }

        #libraryModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--main-bg);
            z-index: 5000;
            padding: 5rem 2rem;
            overflow-y: auto;
        }

        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .library-card {
            background: var(--main-card);
            padding: 2.5rem 1.5rem;
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--main-border);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .library-card:hover { 
            border-color: var(--main-accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>

<header>
    <h1>찬양 아카이브</h1>
    <p>원종제일교회 찬양팀</p>
</header>

<div class="container">
    <div class="announcement">📢 보면대를 꼭 정리해주시기 바랍니다.</div>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="곡명 또는 날짜로 검색하세요..." onkeyup="filterSetlists()">
        <button class="btn" onclick="openLibrary()">곡 보관함 📚</button>
    </div>

    <div id="setlist-container"></div>
</div>

<div id="sheetModal" onclick="closeSheet()">
    <div class="close-overlay">돌아가기</div>
    <img id="modalImg" src="">
    <div id="modalCaption" style="margin-top: 20px; font-weight: 800; font-size: 1.2rem;"></div>
</div>

<div id="libraryModal">
    <div class="container">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 4rem;">
            <h2 style="font-size: 2.2rem; font-weight: 800; margin:0;">전체 악보 목록</h2>
            <button class="btn" onclick="closeLibrary()">닫기</button>
        </div>
        <div id="libraryGrid" class="library-grid"></div>
    </div>
</div>

<script>
    const setlists = [
        {
            date: "2026년 4월 26일",
            songs: [
                { title: "주의음성을내가들으니", key: "G", sheet: "scores/주의음성을내가들으니.jpg" },
                { title: "내가매일기쁘게", key: "G", sheet: "scores/내가매일기쁘게.jpg" },
                { title: "당신은영광의왕", key: "G", sheet: "scores/당신은영광의왕.jpg" }
            ]
        },
        {
            date: "2026년 4월 19일",
            songs: [
                { title: "내가매일기쁘게", key: "G", sheet: "scores/내가매일기쁘게.jpg" },
                { title: "내영혼에햇빛비치니", key: "G", sheet: "scores/내영혼에햇빛비치니.jpg" },
                { title: "은혜로다", key: "D", sheet: "scores/은혜로다.jpg" }
            ]
        },
        {
            date: "2026년 4월 12일",
            songs: [
                { title: "무덤에머물러", key: "A", comment: "📢 후렴구 시작. ‘사셨네’ 느리게 강조.", sheet: "scores/무덤에머물러.jpg" },
                { title: "주하나님독생자예수", key: "A", comment: "🥁 드럼 큐 사인 후 바로 진입.", sheet: "scores/주하나님독생자예수.jpg" },
                { title: "주님큰영광받으소서", key: "A", comment: "🎹 건반/인도자 선창 시작.", sheet: "scores/주님큰영광받으소서.jpg" }
            ]
        },
        {
            date: "2026년 3월 29일",
            songs: [
                { title: "축복송", key: "G", sheet: "scores/축복송.jpg" },
                { title: "나의가장낮은마음", key: "A", sheet: "scores/나의가장낮은마음.jpg" },
                { title: "난예수가좋다오", key: "A", comment: "📢 후렴 시작.", sheet: "scores/난예수가좋다오.jpg" },
                { title: "내안에부어주소서", key: "A", sheet: "scores/내안에부어주소서.jpg" },
                { title: "천국은마치", key: "A", sheet: "scores/천국은마치.jpg" },
                { title: "주만바라볼찌라", key: "A", sheet: "scores/주만바라볼찌라.jpg" },
                { title: "이땅의황무함을보소서", key: "A", sheet: "scores/이땅의황무함을보소서.jpg" },
                { title: "그사랑(기도회찬양)", key: "G", sheet: "scores/그사랑.jpg" }
            ]
        },
        { date: "2026년 3월 22일", songs: [{ title: "내가매일기쁘게", key: "G" }, { title: "내영혼에햇빛비치니", key: "G" }, { title: "주만바라볼찌라", key: "A" }] },
        { date: "2025년 10월 26일", songs: [{ title: "실로암", key: "C" }, { title: "난예수가좋다오", key: "A" }, { title: "나의가장낮은마음", key: "A" }, { title: "하늘소망", key: "A" }] },
        { date: "2023년 12월 8일", songs: [{ title: "축복송", key: "D" }, { title: "주 예수 내 맘에", key: "Ab" }, { title: "부르신 곳에서", key: "E" }] }
    ];

    const globalSheetMap = {};
    setlists.forEach(set => set.songs.forEach(s => { if (s.sheet && !globalSheetMap[s.title]) globalSheetMap[s.title] = s.sheet; }));

    function renderSetlists(data) {
        const container = document.getElementById('setlist-container');
        container.innerHTML = data.map((set, idx) => {
            const hasSheets = set.songs.some(s => s.sheet || globalSheetMap[s.title]);
            const songsHtml = set.songs.map((s) => {
                const sheetPath = s.sheet || globalSheetMap[s.title];
                return `
                <div class="song-row">
                    <div>
                        <div class="song-main">
                            <span class="song-title">${s.title}</span>
                            <span class="song-key">${s.key}</span>
                        </div>
                        ${s.comment ? `<div class="song-comment">${s.comment}</div>` : ''}
                    </div>
                    <div class="action-btns">
                        <a href="https://www.youtube.com/results?search_query=${s.title} 찬양" target="_blank" class="icon-btn" title="유튜브">▶</a>
                        ${sheetPath ? `<div onclick="openSheet('${sheetPath}', '${s.title}')" class="icon-btn" title="악보">🎼</div>` : ''}
                    </div>
                </div>`;
            }).join('');

            return `
            <div class="setlist-item">
                <span class="date-label">${set.date}</span>
                ${songsHtml}
                ${hasSheets ? `<button class="btn" style="width:100%; margin-top:2rem; background: #f1f5f9; color: #475569;" onclick="toggleExpand(${idx})">이미지로 악보 모두 펼치기 🖼️</button>` : ''}
                <div id="expand-${idx}" class="expand-area">
                    ${set.songs.map(s => {
                        const path = s.sheet || globalSheetMap[s.title];
                        return path ? `<p style="font-weight:700; margin-bottom:10px; color:var(--main-accent);">${s.title}</p><img src="${path}" class="sheet-thumb" onclick="openSheet('${path}', '${s.title}')">` : '';
                    }).join('')}
                </div>
            </div>`;
        }).join('');
    }

    function toggleExpand(idx) {
        const el = document.getElementById(`expand-${idx}`);
        const isShow = el.style.display === 'block';
        el.style.display = isShow ? 'none' : 'block';
        event.target.innerText = isShow ? '이미지로 악보 모두 펼치기 🖼️' : '악보 접기 ❌';
    }

    function openSheet(path, title) {
        document.getElementById('modalImg').src = path;
        document.getElementById('modalCaption').innerText = title;
        document.getElementById('sheetModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeSheet() {
        document.getElementById('sheetModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function openLibrary() {
        const grid = document.getElementById('libraryGrid');
        grid.innerHTML = Object.keys(globalSheetMap).sort().map(title => `
            <div class="library-card" onclick="openSheet('${globalSheetMap[title]}', '${title}')">
                <div style="font-size: 2.2rem; margin-bottom: 15px;">🎼</div>
                <div style="font-weight: 800; font-size: 1rem;">${title}</div>
            </div>
        `).join('');
        document.getElementById('libraryModal').style.display = 'block';
    }

    function closeLibrary() { document.getElementById('libraryModal').style.display = 'none'; }

    function filterSetlists() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        renderSetlists(setlists.filter(s => s.date.toLowerCase().includes(q) || s.songs.some(song => song.title.toLowerCase().includes(q))));
    }

    renderSetlists(setlists);
</script>

</body>
</html>
