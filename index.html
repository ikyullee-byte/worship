<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worship Archive | Wonjong First</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --studio-bg: #0f172a;
            --studio-card: #1e293b;
            --studio-accent: #38bdf8;
            --studio-text: #f1f5f9;
            --studio-muted: #94a3b8;
            --studio-border: rgba(255,255,255,0.05);
            --studio-gradient: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
        }

        body {
            background-color: var(--studio-bg);
            color: var(--studio-text);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 4rem 2rem 2rem;
            text-align: center;
            background: radial-gradient(circle at top, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin: 0;
            background: var(--studio-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--studio-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-top: 10px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.5rem 5rem;
        }

        .announcement {
            background: rgba(56, 189, 248, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 3rem;
            font-size: 0.9rem;
            color: var(--studio-accent);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 3rem;
        }

        .search-box {
            flex: 1;
            background: var(--studio-card);
            border: 1px solid var(--studio-border);
            padding: 1rem 1.5rem;
            border-radius: 100px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            border-color: var(--studio-accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .btn {
            background: var(--studio-card);
            border: 1px solid var(--studio-border);
            color: white;
            padding: 0 1.5rem;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--studio-text);
            color: var(--studio-bg);
            transform: translateY(-2px);
        }

        .setlist-grid {
            display: grid;
            gap: 2rem;
        }

        .setlist-item {
            background: var(--studio-card);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid var(--studio-border);
            transition: transform 0.3s ease;
        }

        .date-label {
            font-size: 0.8rem;
            color: var(--studio-accent);
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: block;
            letter-spacing: 0.1em;
        }

        .song-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .song-row:last-child { border-bottom: none; }

        .song-main { display: flex; align-items: center; gap: 15px; }

        .song-title { font-size: 1.2rem; font-weight: 700; color: #fff; }

        .song-key {
            font-size: 0.7rem;
            color: var(--studio-accent);
            border: 1px solid var(--studio-accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 800;
        }

        .song-comment {
            font-size: 0.85rem;
            color: var(--studio-muted);
            margin-top: 5px;
        }

        .action-btns { display: flex; gap: 10px; }

        .icon-btn {
            background: rgba(255,255,255,0.05);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            text-decoration: none;
            color: white;
            font-size: 1rem;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .icon-btn:hover {
            background: var(--studio-accent);
            border-color: var(--studio-accent);
        }

        /* Modal & Lightbox */
        #sheetModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        #modalImg { max-width: 90%; max-height: 80vh; border-radius: 12px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }

        .close-overlay {
            position: absolute; top: 30px; right: 30px;
            font-size: 1rem; color: #fff; background: rgba(255,255,255,0.1);
            padding: 10px 20px; border-radius: 100px; cursor: pointer;
        }

        #libraryModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--studio-bg);
            z-index: 5000;
            padding: 4rem 2rem;
            overflow-y: auto;
        }

        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .library-card {
            background: var(--studio-card);
            padding: 2rem;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--studio-border);
            cursor: pointer;
        }

        .library-card:hover { border-color: var(--studio-accent); }

    </style>
</head>
<body>

<header>
    <h1>WORSHIP ARCHIVE</h1>
    <p>Wonjong First Community</p>
</header>

<div class="container">
    <div class="announcement">📢 보면대를 꼭 정리해주시기바랍니다.</div>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="Search track or date..." onkeyup="filterSetlists()">
        <button class="btn" onclick="openLibrary()">ARCHIVE 📚</button>
    </div>

    <div id="setlist-container" class="setlist-grid"></div>
</div>

<div id="sheetModal" onclick="closeSheet()">
    <div class="close-overlay">CLOSE</div>
    <img id="modalImg" src="">
    <div id="modalCaption" style="margin-top: 20px; font-weight: 700; letter-spacing: 0.1em;"></div>
</div>

<div id="libraryModal">
    <div class="container">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
            <h2 style="font-size: 2rem; margin:0;">LIBRARY</h2>
            <button class="btn" onclick="closeLibrary()">EXIT</button>
        </div>
        <div id="libraryGrid" class="library-grid"></div>
    </div>
</div>

<script>
    const setlists = [
        {
            date: "APR 26, 2026",
            songs: [
                { title: "주의음성을내가들으니", key: "G", sheet: "scores/주의음성을내가들으니.jpg" },
                { title: "내가매일기쁘게", key: "G", sheet: "scores/내가매일기쁘게.jpg" },
                { title: "당신은영광의왕", key: "G", sheet: "scores/당신은영광의왕.jpg" }
            ]
        },
        {
            date: "APR 19, 2026",
            songs: [
                { title: "내가매일기쁘게", key: "G", sheet: "scores/내가매일기쁘게.jpg" },
                { title: "내영혼에햇빛비치니", key: "G", sheet: "scores/내영혼에햇빛비치니.jpg" },
                { title: "은혜로다", key: "D", sheet: "scores/은혜로다.jpg" }
            ]
        },
        {
            date: "APR 12, 2026",
            songs: [
                { title: "무덤에머물러", key: "A", comment: "📢 후렴구 시작. ‘사셨네’ 느리게 강조.", sheet: "scores/무덤에머물러.jpg" },
                { title: "주하나님독생자예수", key: "A", comment: "🥁 드럼 큐 사인 후 바로 진입.", sheet: "scores/주하나님독생자예수.jpg" },
                { title: "주님큰영광받으소서", key: "A", comment: "🎹 건반/인도자 선창 시작. 무릎 꿇고부터 다 같이.", sheet: "scores/주님큰영광받으소서.jpg" }
            ]
        },
        {
            date: "MAR 29, 2026",
            songs: [
                { title: "축복송", key: "G", sheet: "scores/축복송.jpg" },
                { title: "나의가장낮은마음", key: "A", sheet: "scores/나의가장낮은마음.jpg" },
                { title: "난예수가좋다오", key: "A", comment: "📢 후렴 시작.", sheet: "scores/난예수가좋다오.jpg" },
                { title: "내안에부어주소서", key: "A", comment: "🕺 주일학교 율동", sheet: "scores/내안에부어주소서.jpg" }
            ]
        },
        { date: "MAR 22, 2026", songs: [{ title: "내가매일기쁘게", key: "G" }, { title: "내영혼에햇빛비치니", key: "G" }, { title: "주만바라볼찌라", key: "A" }] },
        { date: "DEC 08, 2023", songs: [{ title: "축복송", key: "D" }, { title: "주 예수 내 맘에", key: "Ab" }, { title: "부르신 곳에서", key: "E" }] }
    ];

    const globalSheetMap = {};
    setlists.forEach(set => set.songs.forEach(s => { if (s.sheet && !globalSheetMap[s.title]) globalSheetMap[s.title] = s.sheet; }));

    function renderSetlists(data) {
        const container = document.getElementById('setlist-container');
        container.innerHTML = data.map((set) => {
            const songsHtml = set.songs.map((s) => {
                const sheetPath = s.sheet || globalSheetMap[s.title];
                return `
                <div class="song-row">
                    <div>
                        <div class="song-main">
                            <span class="song-title">${s.title}</span>
                            <span class="song-key">${s.key}</span>
                        </div>
                        ${s.comment ? `<div class="song-comment">${s.comment}</div>` : ''}
                    </div>
                    <div class="action-btns">
                        <a href="https://www.youtube.com/results?search_query=${s.title} 찬양" target="_blank" class="icon-btn">YT</a>
                        ${sheetPath ? `<div onclick="openSheet('${sheetPath}', '${s.title}')" class="icon-btn">🎼</div>` : ''}
                    </div>
                </div>`;
            }).join('');

            return `<div class="setlist-item"><span class="date-label">${set.date}</span>${songsHtml}</div>`;
        }).join('');
    }

    function openSheet(path, title) {
        document.getElementById('modalImg').src = path;
        document.getElementById('modalCaption').innerText = title.toUpperCase();
        document.getElementById('sheetModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeSheet() {
        document.getElementById('sheetModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function openLibrary() {
        const grid = document.getElementById('libraryGrid');
        grid.innerHTML = Object.keys(globalSheetMap).sort().map(title => `
            <div class="library-card" onclick="openSheet('${globalSheetMap[title]}', '${title}')">
                <div style="font-size: 2rem; margin-bottom: 10px;">🎼</div>
                <div style="font-weight: 800;">${title}</div>
            </div>
        `).join('');
        document.getElementById('libraryModal').style.display = 'block';
    }

    function closeLibrary() { document.getElementById('libraryModal').style.display = 'none'; }

    function filterSetlists() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        renderSetlists(setlists.filter(s => s.date.toLowerCase().includes(q) || s.songs.some(song => song.title.toLowerCase().includes(q))));
    }

    renderSetlists(setlists);
</script>

</body>
</html>
