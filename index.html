<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grace Worship Dashboard</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #e0e6ed;
            --text-highlight: #fff;
            --neon-glow: 0 0 15px rgba(110, 64, 255, 0.7);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(at 10% 10%, rgba(60, 10, 120, 0.3) 0px, transparent 50%), radial-gradient(at 90% 90%, rgba(20, 50, 120, 0.3) 0px, transparent 50%);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header { text-align: center; padding: 60px 0 40px; animation: fadeInDown 1s ease-out; }

        h1 {
            background: var(--primary-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            font-weight: 800;
            filter: drop-shadow(var(--neon-glow));
        }

        .section {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .section-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; color: var(--text-highlight); }

        .sheet-list { list-style: none; padding: 0; }
        .sheet-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .btn-action {
            background: var(--primary-grad);
            color: white;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-action:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(110, 64, 255, 0.6); }

        /* 영상 갤러리 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .video-card { background: rgba(0,0,0,0.2); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .video-thumbnail img { width: 100%; height: 180px; object-fit: cover; }
        .video-info { padding: 15px; }
        .video-title { font-weight: 600; color: var(--text-highlight); margin-bottom: 15px; height: 40px; overflow: hidden; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GRACE WORSHIP</h1>
        <p>기쁨으로 주님을 찬양합니다</p>
    </header>

    <div class="section">
        <div class="section-title">🎵 이번 주 찬양 악보</div>
        <ul class="sheet-list">
            <li class="sheet-item">
                <span>1. 찬양의 제사 드리며 (E)</span>
                <a href="#" class="btn-action">Score</a> </li>
        </ul>
    </div>

    <div class="section">
        <div class="section-title">🎬 지난 찬양 영상</div>
        <div class="video-grid">
            
            <div class="video-card">
                <div class="video-thumbnail">
                    <img src="https://img.youtube.com/vi/TsgEDdYrPuM/mqdefault.jpg" alt="예배 영상">
                </div>
                <div class="video-info">
                    <div class="video-title">2026.02.22 원종제일교회 주일 2부 찬양 예배</div>
                    <a href="https://www.youtube.com/watch?v=TsgEDdYrPuM&t=471s" target="_blank" class="btn-action" style="width: 100%; text-align: center; box-sizing: border-box;">영상 재생</a>
                </div>
            </div>

            </div>
    </div>

    <footer style="text-align: center; color: #666; margin-top: 40px;">
        © 2026 Grace Worship Team
    </footer>
</div>

</body>
</html>
